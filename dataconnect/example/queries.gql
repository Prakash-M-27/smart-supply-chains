# 1. Query all public movie lists
query AllPublicMovieLists @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it only retrieves public movie lists.") {
  movieLists(where: {isPublic: {eq: true}}) {
    id
    name
    description
    user {
      displayName
    }
  }
}

# 2. Query a specific movie by its ID
query GetMovieById($movieId: UUID!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it retrieves movie details by ID, which is public information.") {
  movie(id: $movieId) {
    id
    title
    year
    summary
    genres
    runtime
  }
}

# 3. Create a new movie list for the current user
mutation CreateNewMovieList($name: String!, $isPublic: Boolean!, $description: String) @auth(level: USER) {
  movieList_insert(data: {
    userId_expr: "auth.uid",
    name: $name,
    isPublic: $isPublic,
    description: $description,
    createdAt_expr: "request.time",
    updatedAt_expr: "request.time"
  }) {
    id
  }
}

# 4. Add a movie to an existing movie list of the current user
mutation AddMovieToMovieList($movieListId: UUID!, $movieId: UUID!, $position: Int!, $note: String) @auth(level: USER) {
  movieListEntry_insert(data: {
    movieListId: $movieListId,
    movieId: $movieId,
    position: $position,
    note: $note
  }) {
    movieListId
    movieId
  }
}